name: Validate SDP Toolkit

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r Toolkit/tests/requirements.txt
      - run: python Toolkit/scripts/validate_sdp.py --base-ref origin/main
      - run: python -m unittest discover -s Toolkit/tests -p "test_*.py" -v

  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: ./Toolkit/tests/Install-SDP.Tests.ps1
